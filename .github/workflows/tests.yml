name: Data Reconciliation QA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up test databases
        run: python scripts/01_setup_datos_prueba.py

      - name: Run tests
        run: pytest tests/test_reconciliacion.py -v